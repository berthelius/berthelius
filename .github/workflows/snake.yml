name: generate snake

on:
  workflow_dispatch:
  # schedule/push disabled until a classic PAT (read:user) is added as
  # secret GH_PAT and wired below — GITHUB_TOKEN lacks GraphQL budget for
  # the contribution query. See README notes.
  # schedule:
  #   - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: generate snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#B8895B&color_dots=#161b22,#3a2f22,#6b5333,#9a7443,#B8895B
            dist/snake-light.svg?palette=github-light&color_snake=#9A6B3C&color_dots=#ebedf0,#e0d3bf,#c9a97a,#a97f4a,#9A6B3C

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
